<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">Music Graph animated header</title>
  <desc id="desc">Animated SVG header for the Music Graph project with raised text and fully visible vinyl record.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141819"/>
      <stop offset="55%" stop-color="#27483f"/>
      <stop offset="100%" stop-color="#4d947e"/>
      <animate attributeName="x1" values="0;0.08;0" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="1;0.9;1" dur="12s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.26"/>
    </radialGradient>

    <linearGradient id="labelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ee6b38"/>
      <stop offset="30%" stop-color="#e74742"/>
      <stop offset="57%" stop-color="#e8b224"/>
      <stop offset="78%" stop-color="#5fb765"/>
      <stop offset="100%" stop-color="#27aa91"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 0.5 0.5" to="360 0.5 0.5" dur="18s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.42"/>
    </filter>

    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <g id="pill">
      <rect x="0" y="0" width="120" height="58" rx="29" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.2"/>
    </g>
  </defs>

  <rect width="1440" height="760" fill="url(#bg)"/>
  <rect width="1440" height="760" fill="url(#vignette)"/>
  <rect x="18" y="18" width="1404" height="724" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <ellipse cx="240" cy="594" rx="235" ry="136" fill="#091110" opacity="0.28"/>

  <!-- Vinyl record -->
  <g filter="url(#softShadow)">
    <circle cx="790" cy="380" r="360" fill="#030405"/>
  </g>

  <g transform="translate(790 380)">
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="26s" repeatCount="indefinite" additive="sum"/>
    <circle r="336" fill="none" stroke="#15191a" stroke-width="7" opacity="0.94"/>
    <circle r="316" fill="none" stroke="#101415" stroke-width="7" opacity="0.96"/>
    <circle r="296" fill="none" stroke="#171b1c" stroke-width="7" opacity="0.94"/>
    <circle r="276" fill="none" stroke="#101415" stroke-width="7" opacity="0.96"/>
    <circle r="256" fill="none" stroke="#171b1c" stroke-width="7" opacity="0.94"/>
    <circle r="236" fill="none" stroke="#101415" stroke-width="7" opacity="0.96"/>
    <circle r="216" fill="none" stroke="#171b1c" stroke-width="7" opacity="0.94"/>
    <circle r="196" fill="none" stroke="#101415" stroke-width="7" opacity="0.96"/>
    <circle r="176" fill="none" stroke="#171b1c" stroke-width="7" opacity="0.94"/>
    <circle r="156" fill="none" stroke="#101415" stroke-width="7" opacity="0.96"/>
    <circle r="136" fill="none" stroke="#171b1c" stroke-width="7" opacity="0.94"/>
    <circle r="116" fill="none" stroke="#101415" stroke-width="7" opacity="0.96"/>
  </g>

  <g>
    <circle cx="790" cy="380" r="96" fill="url(#labelGrad)">
      <animate attributeName="r" values="94;98;94" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="790" cy="380" r="28" fill="#f4f1e9" opacity="0.96"/>
    <circle cx="790" cy="380" r="10" fill="#27463f"/>
    <g stroke="#f4f1e9" stroke-linecap="round" fill="none" stroke-width="7">
      <path d="M769 372 L784 356"/>
      <path d="M769 372 L792 377"/>
    </g>
  </g>

  <!-- Copy block -->
  <g filter="url(#textShadow)">
    <text x="88" y="145" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="900" fill="#f0ede7">MUSIC GRAPH</text>
    <text x="88" y="218" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="900" fill="#f6f3eb">Твой вкус как сеть артистов</text>

    <text x="88" y="290" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="400" fill="#ece7dd" opacity="0.96">Не просто список любимых треков, а живая карта:</text>
    <text x="88" y="328" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="400" fill="#ece7dd" opacity="0.96">кто с кем связан, кого ты уже знаешь и где рядом</text>
    <text x="88" y="366" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="400" fill="#ece7dd" opacity="0.96">спрятаны новые коллабы.</text>
  </g>

  <!-- Tags -->
  <g transform="translate(88 410)">
    <g>
      <use href="#pill"/>
      <text x="60" y="37" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#f3eee4">лайки</text>
    </g>
    <g transform="translate(136 0)">
      <use href="#pill"/>
      <text x="60" y="37" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#f3eee4">волна</text>
    </g>
    <g transform="translate(272 0)">
      <rect x="0" y="0" width="152" height="58" rx="29" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.2"/>
      <text x="76" y="37" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#f3eee4">коллабы</text>
    </g>
  </g>

  <!-- Equalizer -->
  <g transform="translate(1220 430)" fill="#f1efe8" opacity="0.9">
    <rect x="0" y="88" width="26" height="94" rx="13">
      <animate attributeName="y" values="92;78;92" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="height" values="90;104;90" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="44" y="8" width="26" height="174" rx="13">
      <animate attributeName="y" values="16;8;16" dur="1.9s" repeatCount="indefinite"/>
      <animate attributeName="height" values="166;174;166" dur="1.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="88" y="56" width="26" height="126" rx="13">
      <animate attributeName="y" values="60;46;60" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="height" values="122;136;122" dur="1.4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
