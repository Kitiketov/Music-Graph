name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Backend checks
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m ruff check app tests
          python -m pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}

    steps:
      - name: Validate deploy secrets
        run: |
          test -n "$SERVER_HOST" || (echo "Missing SERVER_HOST secret" && exit 1)
          test -n "$SERVER_USER" || (echo "Missing SERVER_USER secret" && exit 1)
          test -n "$DEPLOY_PATH" || (echo "Missing DEPLOY_PATH secret" && exit 1)
          test -n "$SERVER_SSH_KEY" || (echo "Missing SERVER_SSH_KEY secret" && exit 1)

      - name: Configure SSH
        run: |
          SERVER_PORT="${SERVER_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Deploy with Docker Compose
        run: |
          SERVER_PORT="${SERVER_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' REPO_URL='https://github.com/${{ github.repository }}.git' DEPLOY_REF='${{ github.ref_name }}' DEPLOY_SHA='${{ github.sha }}' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          if ! command -v git >/dev/null 2>&1; then
            echo "git is not installed on the server"
            exit 1
          fi

          if ! command -v docker >/dev/null 2>&1; then
            echo "docker is not installed on the server"
            exit 1
          fi

          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"

          if [ ! -d .git ]; then
            git init
            git remote add origin "$REPO_URL"
          else
            git remote set-url origin "$REPO_URL"
          fi

          git fetch --prune origin "$DEPLOY_REF"
          git checkout -B "$DEPLOY_REF" "origin/$DEPLOY_REF"
          git reset --hard "$DEPLOY_SHA"

          if [ ! -f .env ]; then
            echo "Missing $DEPLOY_PATH/.env on the server. Create it from .env.example and rerun deploy."
            exit 1
          fi

          docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
          docker compose -f docker-compose.prod.yml ps
          docker image prune -f
          REMOTE_SCRIPT
